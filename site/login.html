<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stash - Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 900px;
            width: 90%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .welcome {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .welcome h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .welcome p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .auth-section {
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
        }

        .auth-section h2 {
            text-align: center;
            margin-bottom: 1rem;
            color: #333;
        }

        .btn {
            padding: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-login {
            background: #667eea;
            color: #fff;
        }

        .btn-signup {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-content form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .modal-content input {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome">
            <h1>Stash</h1>
            <p>Bienvenue dans l'univers des plus belles peluches du marche</p>
        </div>
        <div class="auth-section">
            <h2>Acces Client</h2>
            <a href="#" class="btn btn-login">Se Connecter</a>
            <a href="#" class="btn btn-signup">Creer un Compte</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:3000/api";

        document.querySelector(".btn-login").addEventListener("click", function (e) {
            e.preventDefault();
            showLoginModal();
        });

        document.querySelector(".btn-signup").addEventListener("click", function (e) {
            e.preventDefault();
            showSignupModal();
        });

        function closeModal(modal) {
            modal.remove();
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const data = await response.json().catch(function () {
                return { message: "Reponse serveur invalide." };
            });
            return { response: response, data: data };
        }

        function showLoginModal() {
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>Se connecter</h2>
                    <form id="login-form">
                        <input type="email" id="login-email" placeholder="Email" required>
                        <input type="password" id="login-password" placeholder="Mot de passe" required>
                        <button type="submit" class="btn btn-login">Connexion</button>
                    </form>
                </div>
            `;

            document.body.appendChild(modal);
            modal.style.display = "block";

            modal.querySelector(".close").onclick = function () {
                closeModal(modal);
            };

            modal.querySelector("#login-form").addEventListener("submit", async function (event) {
                event.preventDefault();

                const email = modal.querySelector("#login-email").value.trim().toLowerCase();
                const password = modal.querySelector("#login-password").value;

                try {
                    const result = await postJson(`${API_BASE_URL}/login`, {
                        email: email,
                        mot_de_passe: password,
                    });

                    if (!result.response.ok) {
                        alert(result.data.message || "Email ou mot de passe incorrect.");
                        return;
                    }

                    window.location.href = "homepage.html";
                } catch (error) {
                    alert("Impossible de joindre le serveur.");
                }
            });
        }

        function showSignupModal() {
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>Creer un compte</h2>
                    <form id="signup-form">
                        <input type="text" id="signup-name" placeholder="Nom" required>
                        <input type="email" id="signup-email" placeholder="Email" required>
                        <input type="password" id="signup-password" placeholder="Mot de passe" required>
                        <button type="submit" class="btn btn-signup">S'inscrire</button>
                    </form>
                </div>
            `;

            document.body.appendChild(modal);
            modal.style.display = "block";

            modal.querySelector(".close").onclick = function () {
                closeModal(modal);
            };

            modal.querySelector("#signup-form").addEventListener("submit", async function (event) {
                event.preventDefault();

                const name = modal.querySelector("#signup-name").value.trim();
                const email = modal.querySelector("#signup-email").value.trim().toLowerCase();
                const password = modal.querySelector("#signup-password").value;

                try {
                    const result = await postJson(`${API_BASE_URL}/signup`, {
                        nom: name,
                        email: email,
                        mot_de_passe: password,
                    });

                    if (!result.response.ok) {
                        alert(result.data.message || "Erreur pendant l'inscription.");
                        return;
                    }

                    alert("Compte créé avec succes. Connectez-vous maintenant.");
                    closeModal(modal);
                } catch (error) {
                    alert("Impossible de joindre le serveur.");
                }
            });
        }
    </script>
</body>
</html>
